<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechGuds - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
    <a href="index.html" class="logo">Tech<span>Guds</span></a>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html">Shop</a></li>
        <li><a href="login.html">Login</a></li>
        <li class="cart-link"><a href="#" id="cart-link">🛒 Cart (0)</a></li>
    </ul>
</nav>

<div class="login-page">
    <div class="login-box">

        <a href="index.html" class="login-logo">Tech<span>Guds</span></a>

        <h2>Welcome Back 👋</h2>
        <p class="sub">Login to access your account and orders</p>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <div class="forgot">
            <a href="#">Forgot password?</a>
        </div>

        <button class="btn-login" onclick="handleLogin()">Login to TechGuds</button>

        <div class="divider">or</div>

        <p class="create-acc">Don't have an account? <a href="signup.html">Create one for free →</a></p>
    </div>
</div>

<footer>
    <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        <p>&copy; 2024 <span>TechGuds</span> — Student Project. All rights reserved.</p>
    </div>
</footer>

<script>
function handleSignup() {
    var name = document.getElementById("name").value;
    var email = document.getElementById("email").value;
    var password = document.getElementById("password").value;
    var confirm = document.getElementById("confirm").value;

    if (name == "" || email == "" || password == "" || confirm == "") {
        alert("Please fill in all fields.");
        return;
    }

    var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
        alert("Please enter a valid email address.");
        return;
    }

    var passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{6,}$/;
    if (!passwordPattern.test(password)) {
        alert("Password must contain at least 1 uppercase letter, 1 lowercase letter, and 1 number.");
        return;
    }

    if (password !== confirm) {
        alert("Passwords do not match.");
        return;
    }

    // Save user data (localStorage)
    localStorage.setItem("userName", name);
    localStorage.setItem("userEmail", email);
    localStorage.setItem("userPassword", password);

    alert("Account created successfully 🎉");

    // Redirect to login
    window.location.href = "login.html";
}
</script>
    
</body>
</html>
